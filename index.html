<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XAM V3</title>
    <style>
        :root { --neon: #00ff41; --bg: #020202; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .panel { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 4px; }
        .big { font-size: 3rem; color: #fff; margin: 10px 0; }
        .btn { border: 1px solid var(--neon); background: none; color: var(--neon); padding: 15px; width: 100%; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn:hover { background: var(--neon); color: #000; }
        .danger { border-color: #ff5f56; color: #ff5f56; }
        #log { background: #000; height: 120px; overflow-y: auto; font-size: 0.7rem; padding: 10px; border: 1px solid #111; color: #008f11; }
        .bar-bg { background: #111; height: 4px; width: 100%; }
        .bar-fill { background: var(--neon); height: 100%; width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div style="border-bottom: 1px solid #111; padding-bottom: 10px; margin-bottom: 20px;">
    <h1 style="margin:0; letter-spacing: 5px;">XAM_CORE_V3</h1>
</div>

<div class="grid">
    <div class="panel">
        <div style="color:#444; font-size:0.7rem;">SYSTEM_METRICS</div>
        <div style="display:flex; justify-content: space-between;">
            <div>
                <div style="font-size:0.8rem;">CPU_LOAD</div>
                <div class="big" id="cpu">0%</div>
                <div class="bar-bg"><div id="cpu-bar" class="bar-fill"></div></div>
            </div>
            <div style="text-align:right;">
                <div style="font-size:0.8rem;">RAM_USAGE</div>
                <div class="big" id="ram">0%</div>
                <div class="bar-bg"><div id="ram-bar" class="bar-fill"></div></div>
            </div>
        </div>
        <div style="margin-top:30px;">
            <div style="font-size:0.8rem;">CORE_TEMP: <span id="temp" style="color:#ffbd2e; font-size:1.5rem;">0°C</span></div>
            <div style="font-size:0.8rem; margin-top:10px;">LINK: <span id="link">SYNCING...</span></div>
        </div>
    </div>

    <div class="panel">
        <div style="color:#444; font-size:0.7rem; margin-bottom:15px;">EXECUTION_PANEL</div>
        <button class="btn" onclick="run('screenshot')">SCREENSHOT</button>
        <button class="btn" onclick="run('calc')">TEST_CALC</button>
        <button class="btn danger" onclick="run('reboot')">REBOOT</button>
        <button class="btn danger" onclick="run('shutdown')">SHUTDOWN</button>
        <div id="log">SYSTEM_READY</div>
    </div>
</div>

<script>
    const CONFIG = {
        u: 'drodilkin',
        r: 'my-pc-monitor',
        t: 'ТВОЙ_НОВЫЙ_ТОКЕН'
    };

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${new Date().toLocaleTimeString()}: ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    async function run(a) {
        if(!confirm('Run ' + a + '?')) return;
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.u}/${CONFIG.r}/contents/command.json`);
            const f = await res.json();
            const body = { 
                message: "cmd", 
                content: btoa(JSON.stringify({command: a, time: Date.now()})), 
                sha: f.sha 
            };
            await fetch(`https://api.github.com/repos/${CONFIG.u}/${CONFIG.r}/contents/command.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${CONFIG.CONFIG_TOKEN || CONFIG.t}` },
                body: JSON.stringify(body)
            });
            addLog('Sent: ' + a);
        } catch(e) { addLog('Error: ' + e.message); }
    }

    async function sync() {
        try {
            const r = await fetch(`https://raw.githubusercontent.com/${CONFIG.u}/${CONFIG.r}/main/stats.json?t=${Date.now()}`);
            const d = await r.json();
            
            document.getElementById('cpu').innerText = parseFloat(d.cpu) + '%';
            document.getElementById('ram').innerText = parseFloat(d.ram) + '%';
            document.getElementById('cpu-bar').style.width = d.cpu + '%';
            document.getElementById('ram-bar').style.width = d.ram + '%';
            document.getElementById('temp').innerText = d.temp.toString().replace('°C','') + '°C';
            
            document.getElementById('link').innerText = 'SECURE';
            document.getElementById('link').style.color = '#00ff41';
        } catch(e) {
            document.getElementById('link').innerText = 'OFFLINE';
            document.getElementById('link').style.color = '#ff5f56';
        }
    }

    setInterval(sync, 5000); // Обновление каждые 5 секунд
    sync();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XAM PC MONITOR</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .monitor { 
            border: 2px solid #333; 
            padding: 40px; 
            background: #050505;
            box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }
        .item { margin-bottom: 15px; font-size: 1.5rem; }
        .label { color: #888; font-size: 0.8rem; display: block; }
        .val { font-weight: bold; color: #fff; }
        .cursor { animation: b 1s infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
    <meta http-equiv="refresh" content="20">
</head>
<body>

<div class="monitor">
    <div style="color:#444; font-size:0.7rem; margin-bottom:20px;">> SYSTEM_LINK_ACTIVE</div>
    
    <div class="item">
        <span class="label">ПРОЦЕССОР</span>
        <span id="cpu" class="val">--%</span>
    </div>

    <div class="item">
        <span class="label">ГРАДУСЫ</span>
        <span id="temp" class="val" style="color:#ffae00;">--°C</span>
    </div>

    <div class="item">
        <span class="label">ПАМЯТЬ</span>
        <span id="ram" class="val">--%</span>
    </div>

    <div style="margin-top:30px; font-size:0.9rem;">
        STATUS: <span id="status" style="color:#0f0;">ONLINE</span><span class="cursor">_</span>
    </div>
</div>

<script>
    // Здесь мы используем простейший fetch. 
    // Замени 'drodilkin' на свой ник, если я ошибся
    const url = "https://raw.githubusercontent.com/drodilkin/my-pc-monitor/main/stats.json";

    async function loadStats() {
        try {
            const r = await fetch(url + "?nocache=" + Date.now());
            const d = await r.json();
            document.getElementById('cpu').innerText = d.cpu;
            document.getElementById('ram').innerText = d.ram;
            document.getElementById('temp').innerText = d.temp;
            document.getElementById('status').innerText = d.status.toUpperCase();
        } catch(e) {
            document.getElementById('status').innerText = "CONNECTING...";
        }
    }
    loadStats();
</script>

</body>
</html>

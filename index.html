<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XAM | SERVER_DASHBOARD</title>
    <style>
        body { background: #000; color: #00ff41; font-family: "Consolas", monospace; padding: 20px; }
        .stats { display: flex; gap: 30px; margin-bottom: 20px; font-size: 1.2rem; }
        .val { color: #fff; }
        
        /* СТИЛЬ КОНСОЛИ */
        #terminal {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 15px;
            height: 250px;
            overflow: hidden;
            font-size: 12px;
            color: #ccc;
            box-shadow: inset 0 0 10px #000;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; }
        .dim { color: #555; }
        .prefix { color: #00ff41; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="dim">XAM_REMOTE_CONSOLE [Active]</div>
    
    <div class="stats">
        <div>CPU: <span id="c" class="val">0</span>%</div>
        <div>RAM: <span id="r" class="val">0</span>%</div>
        <div>TEMP: <span id="t" class="val">0</span>°C</div>
    </div>

    <div class="dim">SERVER_LOG_STREAM:</div>
    <div id="terminal">
        <div class="log-entry">Waiting for stream...</div>
    </div>

    <script>
        const REPO = "drodilkin/my-pc-monitor";

        async function update() {
            try {
                // Используем API для обхода кэша
                const r = await fetch(`https://api.github.com/repos/${REPO}/contents/stats.json?t=${Date.now()}`);
                const j = await r.json();
                const d = JSON.parse(atob(j.content));

                // Цифры
                document.getElementById('c').innerText = Math.round(d.cpu);
                document.getElementById('r').innerText = Math.round(d.ram);
                document.getElementById('t').innerText = d.temp;

                // Консоль
                const term = document.getElementById('terminal');
                term.innerHTML = ""; // Чистим старое
                
                if (d.logs && d.logs.length > 0) {
                    d.logs.forEach(line => {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        div.innerHTML = `<span class="prefix">></span>${line}`;
                        term.appendChild(div);
                    });
                }
            } catch(e) {}
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>

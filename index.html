<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XAM | HYPER_DASHBOARD_V9</title>
    <style>
        :root { --neon: #00ff41; --neon-dim: rgba(0, 255, 65, 0.2); --bg: #050505; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; overflow: hidden; }
        
        /* CRT Effect Overlay */
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        
        .main-container { display: grid; grid-template-rows: 60px 1fr 250px; height: 100vh; padding: 15px; gap: 15px; z-index: 1; position: relative; }
        
        /* Top Bar */
        .top-bar { border: 1px solid var(--neon); background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; box-shadow: 0 0 15px var(--neon-dim); }
        .glitch { font-size: 1.8rem; font-weight: bold; letter-spacing: 10px; text-transform: uppercase; animation: glitch 1s linear infinite; }
        
        /* Center Engine */
        .engine-room { display: grid; grid-template-columns: 1fr 1fr 350px; gap: 15px; }
        .data-module { border: 1px solid var(--neon); background: rgba(0, 10, 0, 0.9); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .data-module::after { content: "CORE_LINK_STABLE"; position: absolute; bottom: 5px; right: 10px; font-size: 0.6rem; opacity: 0.4; }
        
        .big-val { font-size: 18vw; font-weight: 900; line-height: 0.7; margin: 0; text-shadow: 0 0 40px var(--neon); }
        .sub-label { font-size: 1.5rem; color: #fff; letter-spacing: 5px; margin-top: 10px; }

        /* Side Info */
        .side-stack { display: grid; grid-template-rows: repeat(4, 1fr); gap: 10px; }
        .stat-box { border: 1px solid var(--neon-dim); background: rgba(0,5,0,0.5); padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }

        /* Bottom Deck */
        .bottom-deck { display: grid; grid-template-columns: 500px 1fr 300px; gap: 15px; }
        .terminal { background: #000; border: 1px solid var(--neon); padding: 15px; font-size: 0.85rem; overflow-y: auto; color: var(--neon); box-shadow: inset 0 0 10px #000; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); font-family: inherit; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1rem; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); }
        .btn-kill { border-color: #ff003c; color: #ff003c; }
        .btn-kill:hover { background: #ff003c; color: #fff; box-shadow: 0 0 25px #ff003c; }

        @keyframes glitch { 2% { transform: translate(2px,0) skew(0deg); } 4% { transform: translate(-2px,0) skew(0deg); } 6% { transform: translate(0,0) skew(5deg); } }
    </style>
</head>
<body class="crt">

<div class="main-container">
    <div class="top-bar">
        <div class="glitch">XAM_SYS_V9.0</div>
        <div id="status-tag" style="color: #ffbd2e;">[ SYNCHRONIZING ]</div>
        <div id="digital-clock" style="font-size: 1.5rem;">00:00:00</div>
    </div>

    <div class="engine-room">
        <div class="data-module">
            <div class="sub-label">CPU_CORE_LOAD</div>
            <div class="big-val" id="cpu-num">00</div>
            <div style="width: 80%; height: 5px; background: var(--neon-dim); margin-top: 20px;"><div id="cpu-bar" style="width: 0%; height: 100%; background: var(--neon);"></div></div>
        </div>
        <div class="data-module">
            <div class="sub-label">RAM_BLOCK_USE</div>
            <div class="big-val" id="ram-num">00</div>
            <div style="width: 80%; height: 5px; background: var(--neon-dim); margin-top: 20px;"><div id="ram-bar" style="width: 0%; height: 100%; background: var(--neon);"></div></div>
        </div>
        <div class="side-stack">
            <div class="stat-box"><span>NET_LINK:</span><span id="net-val">ENCRYPTED</span></div>
            <div class="stat-box"><span>FIREWALL:</span><span style="color:#00ff41">ACTIVE</span></div>
            <div class="stat-box"><span>UPTIME:</span><span id="uptime-val">FETCHING</span></div>
            <div class="stat-box"><span>TEMP:</span><span id="temp-val">--°C</span></div>
        </div>
    </div>

    <div class="bottom-deck">
        <div class="button-grid">
            <button onclick="sendCmd('screenshot')">Snap_Screen</button>
            <button onclick="sendCmd('calc')">Open_Tool</button>
            <button class="btn-kill" onclick="sendCmd('reboot')">Sys_Reboot</button>
            <button class="btn-kill" onclick="sendCmd('shutdown')">Full_Kill</button>
        </div>
        <div class="terminal" id="term-log">>> BOOTING KERNEL... INITIALIZING DATA LINK...</div>
        <div style="border: 1px solid var(--neon-dim); padding: 10px; font-size: 0.7rem; text-transform: uppercase;">
            Enc_Key: 0x88A21B<br>Node: DROD_PROD_1<br>Socket: LGA775_EXT
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        u: 'drodilkin', r: 'my-pc-monitor',
        t: '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'
    };

    function log(m) {
        const t = document.getElementById('term-log');
        t.innerHTML += `<div>[${new Date().toLocaleTimeString()}] > ${m}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    async function sendCmd(a) {
        if(!confirm('AUTHORIZE ' + a.toUpperCase() + '?')) return;
        log('TRANSMITTING_CMD: ' + a);
        try {
            const r = await fetch(`https://api.github.com/repos/${CONFIG.u}/${CONFIG.r}/contents/command.json`);
            const f = await r.json();
            const b = { message: "uplink", content: btoa(JSON.stringify({command: a, time: Date.now()})), sha: f.sha };
            await fetch(`https://api.github.com/repos/${CONFIG.u}/${CONFIG.r}/contents/command.json`, {
                method: 'PUT', headers: { 'Authorization': 'token ' + CONFIG.t }, body: JSON.stringify(b)
            });
            log('UPLINK_SUCCESS: ' + a);
        } catch(e) { log('UPLINK_FAILED: ' + e.message); }
    }

    async function update() {
        try {
            const r = await fetch(`https://raw.githubusercontent.com/${CONFIG.u}/${CONFIG.r}/main/stats.json?t=` + Date.now());
            const d = await r.json();
            document.getElementById('cpu-num').innerText = Math.round(d.cpu);
            document.getElementById('cpu-bar').style.width = d.cpu + '%';
            document.getElementById('ram-num').innerText = Math.round(d.ram);
            document.getElementById('ram-bar').style.width = d.ram + '%';
            document.getElementById('temp-val').innerText = (d.temp || '--') + '°C';
            document.getElementById('status-tag').innerText = '[ LINK_ESTABLISHED ]';
            document.getElementById('status-tag').style.color = '#00ff41';
        } catch(e) { document.getElementById('status-tag').innerText = '[ LINK_DROPPED ]'; document.getElementById('status-tag').style.color = '#ff003c'; }
    }

    setInterval(() => { document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(update, 4000); update();
</script>
</body>
</html>

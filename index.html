<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xam | System Terminal</title>
    <style>
        /* Полный сброс и хакерский фон */
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Окно терминала */
        .terminal {
            width: 95%;
            max-width: 500px;
            background: #000;
            border: 1px solid #1a1a1a;
            padding: 40px 30px 30px 30px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.05);
            position: relative;
        }

        /* Декоративные точки в углу */
        .terminal::before {
            content: "● ● ●";
            position: absolute;
            top: 10px;
            left: 15px;
            color: #333;
            font-size: 10px;
            letter-spacing: 3px;
        }

        /* Строки данных */
        .line {
            margin-bottom: 20px;
            border-bottom: 1px dashed #111;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .label {
            color: #555;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }

        /* Температура выделяется оранжевым */
        #temp {
            color: #ffb100;
            text-shadow: 0 0 8px rgba(255, 177, 0, 0.3);
        }

        /* Статус-мигалка */
        .status-box {
            display: inline-block;
            border: 1px solid #00ff41;
            padding: 3px 10px;
            font-size: 0.8rem;
            transition: all 0.5s ease;
        }

        .header-text {
            color: #444;
            font-size: 0.8rem;
            margin-bottom: 25px;
            text-align: center;
            display: block;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00ff41;
            animation: blink 1s infinite;
            margin-left: 5px;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <span class="header-text">-- XAM_SYSTEM_CORE_v1.0 --</span>
    
    <div class="line">
        <span class="label">CPU Usage</span>
        <span id="cpu" class="value">--%</span>
    </div>

    <div class="line">
        <span class="label">Core Temp</span>
        <span id="temp" class="value">--°C</span>
    </div>

    <div class="line">
        <span class="label">Memory</span>
        <span id="ram" class="value">--%</span>
    </div>

    <div class="line" style="border: none;">
        <span class="label">Link Status</span>
        <span id="status" class="status-box">SEARCHING</span>
    </div>

    <div style="margin-top: 20px; font-size: 0.8rem; color: #222;">
        root@xam_pc:~$ monitoring active <span class="cursor"></span>
    </div>
</div>

<script>
    // --- НАСТРОЙКИ (ЗАМЕНИ НА СВОИ) ---
    const OWNER = 'drodilkin'; // Твой ник на GitHub
    const REPO = 'my-pc-monitor'; // Имя репозитория
    const PATH = 'stats.json'; // Имя файла с данными
    // ----------------------------------

    async function updateDashboard() {
        const statusBox = document.getElementById('status');
        
        try {
            // Запрос к GitHub API с меткой времени, чтобы не было кеша
            const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?t=${Date.now()}`);
            
            if (!response.ok) throw new Error('API_ERR');

            const data = await response.json();
            
            // Расшифровка base64 из GitHub API
            const stats = JSON.parse(atob(data.content));

            // Заполнение данными
            document.getElementById('cpu').innerText = stats.cpu;
            document.getElementById('ram').innerText = stats.ram;
            document.getElementById('temp').innerText = stats.temp;
            statusBox.innerText = stats.status.toUpperCase();

            // Смена стиля если всё ок
            statusBox.style.color = "#00ff41";
            statusBox.style.borderColor = "#00ff41";
            
            console.log("Sync Complete:", stats);

        } catch (error) {
            console.error("Sync Error:", error);
            statusBox.innerText = "OFFLINE";
            statusBox.style.color = "#ff4444";
            statusBox.style.borderColor = "#ff4444";
        }
    }

    // Обновляем каждые 15 секунд (баланс между скоростью и лимитами GitHub)
    setInterval(updateDashboard, 15000);
    updateDashboard(); // Запуск при открытии
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    
    <title>Xam | System Terminal</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 95%; max-width: 500px; background: #000; border: 1px solid #1a1a1a; padding: 40px 30px 30px 30px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.05); position: relative; }
        .terminal::before { content: "● ● ●"; position: absolute; top: 10px; left: 15px; color: #333; font-size: 10px; letter-spacing: 3px; }
        .line { margin-bottom: 20px; border-bottom: 1px dashed #111; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: flex-end; }
        .label { color: #555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
        #temp { color: #ffb100; text-shadow: 0 0 8px rgba(255, 177, 0, 0.3); }
        .status-box { display: inline-block; border: 1px solid #00ff41; padding: 3px 10px; font-size: 0.8rem; transition: all 0.5s ease; color: #00ff41; text-transform: uppercase; }
        .header-text { color: #444; font-size: 0.8rem; margin-bottom: 25px; text-align: center; display: block; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: #00ff41; animation: blink 1s infinite; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <span class="header-text">-- XAM_SYSTEM_CORE_v1.0 --</span>
    <div class="line"><span class="label">CPU Usage</span><span id="cpu" class="value">--%</span></div>
    
    <div class="line"><span class="label">Core Temp</span><span id="temp" class="value">--</span></div>
    
    <div class="line"><span class="label">Memory</span><span id="ram" class="value">--%</span></div>
    <div class="line" style="border: none;"><span class="label">Link Status</span><span id="status" class="status-box">WAITING</span></div>
    <div style="margin-top: 20px; font-size: 0.8rem; color: #222;">root@xam_pc:~$ monitoring active <span class="cursor"></span></div>
</div>

<script>
    // --- НАСТРОЙКИ ---
    const OWNER = 'drodilkin'; 
    const REPO = 'my-pc-monitor'; 
    const PATH = 'stats.json'; 

    async function updateDashboard() {
        const statusBox = document.getElementById('status');
        try {
            const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?t=${Date.now()}`);
            if (!response.ok) throw new Error('API_ERR');
            const data = await response.json();
            
            // Читаем данные. Важно: atob('base64...') работает только с латиницей, 
            // поэтому мы не можем хранить русский текст в stats.json.
            const stats = JSON.parse(atob(data.content));

            document.getElementById('cpu').innerText = stats.cpu;
            document.getElementById('ram').innerText = stats.ram;
            
            // ЧИНИМ ГРАДУСЫ: добавляем значок в коде
            // Заменяем запятую на точку в температуре, чтобы выглядело аккуратнее
            const cleanTemp = stats.temp.replace(',', '.');
            document.getElementById('temp').innerHTML = cleanTemp + '&deg;C';
            
            // ЧИНИМ СТАТУС: Пишем его на английском, так надежнее
            if (stats.cpu < 80) {
                statusBox.innerText = "OPTIMAL";
                statusBox.style.color = "#00ff41";
                statusBox.style.borderColor = "#00ff41";
            } else {
                statusBox.innerText = "HOT";
                statusBox.style.color = "#ffb100";
                statusBox.style.borderColor = "#ffb100";
            }

        } catch (error) {
            statusBox.innerText = "OFFLINE";
            statusBox.style.color = "#ff4444";
            statusBox.style.borderColor = "#ff4444";
        }
    }
    setInterval(updateDashboard, 15000);
    updateDashboard();
</script>

</body>
</html>

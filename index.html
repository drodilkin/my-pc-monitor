<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAM | TERMINAL</title>
    <style>
        body { 
            background: #020202; color: #00ff41; 
            font-family: 'Consolas', 'Monaco', monospace; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0;
        }
        
        .terminal {
            width: 95%; max-width: 450px;
            background: #000; border: 1px solid #00ff41;
            padding: 25px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }

        .header { border-bottom: 1px solid #111; padding-bottom: 10px; margin-bottom: 20px; font-size: 13px; color: #555; }
        .row { margin: 10px 0; display: flex; justify-content: space-between; font-size: 16px; }
        .val { color: #fff; font-weight: bold; }
        
        .srv-block { margin-top: 25px; padding-top: 15px; border-top: 1px solid #111; }
        .RUNNING { color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        .OFFLINE { color: #ff3e3e; }

        .cursor { display: inline-block; width: 8px; height: 15px; background: #00ff41; margin-left: 5px; animation: b 1s infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">XAM_REMOTE_ACCESS_v18.5 // STATUS: SECURE</div>

    <div class="row"><span>CPU_LOAD:</span> <span id="c" class="val">0%</span></div>
    <div class="row"><span>RAM_USAGE:</span> <span id="r" class="val">0%</span></div>
    <div class="row"><span>CORE_TEMP:</span> <span id="t" class="val">0°C</span></div>
    
    <div class="srv-block" id="servers"></div>

    <div style="margin-top:25px; font-size: 12px; color: #333;">
        LAST_SYNC: <span id="time">--:--:--</span><br>
        SYSTEM_READY <span class="cursor"></span>
    </div>
</div>

<script>
    // ЗАМЕНИ НА СВОЙ РЕПОЗИТОРИЙ
    const REPO = "drodilkin/my-pc-monitor"; 

    async function sync() {
        try {
            // Добавляем ?t= для обхода кэша GitHub
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/stats.json?t=${Date.now()}`);
            const j = await r.json();
            const d = JSON.parse(atob(j.content));

            // Обновляем основные показатели
            document.getElementById('c').innerText = Math.round(d.cpu) + '%';
            document.getElementById('r').innerText = Math.round(d.ram) + '%';
            document.getElementById('t').innerText = d.temp + '°C';
            document.getElementById('time').innerText = d.time;

            // Обновляем список серверов
            const srvCont = document.getElementById('servers');
            srvCont.innerHTML = "";
            
            // Если в json есть сервера, выводим их
            if (d.servers) {
                for (const [name, status] of Object.entries(d.servers)) {
                    srvCont.innerHTML += `
                        <div class="row">
                            <span>> ${name.replace(/_/g, ' ')}</span>
                            <span class="${status}">${status}</span>
                        </div>`;
                }
            } else if (d.logs) {
                // Если серверов нет, но есть логи (старая структура)
                srvCont.innerHTML = `<div style="font-size:10px; color:#444">${d.logs[0]}</div>`;
            }
        } catch(e) {
            console.log("Sync error:", e);
        }
    }

    setInterval(sync, 5000);
    sync();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XAM | ULTRA TERMINAL V5</title>
    <style>
        :root { --neon: #00ff41; --bg: #010101; --panel: rgba(0, 20, 0, 0.8); }
        
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }

        /* Эффект старого ЭЛТ монитора */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .screen {
            display: grid; grid-template-rows: 60px 1fr 200px;
            width: 100vw; height: 100vh; padding: 15px; gap: 15px; position: relative; z-index: 1;
        }

        /* Верхняя панель */
        .top-bar { border: 1px solid var(--neon); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; background: var(--panel); box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        .glitch { font-size: 1.5rem; font-weight: bold; letter-spacing: 10px; animation: blink 1s infinite; }

        /* Центр: Мониторинг */
        .main-engine { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .module { border: 1px solid var(--neon); background: var(--panel); padding: 30px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .module::after { content: "MODULE_ACTIVE"; position: absolute; top: 5px; right: 10px; font-size: 0.6rem; opacity: 0.5; }

        .big-data { font-size: 10rem; font-weight: bold; line-height: 1; margin: 20px 0; text-shadow: 0 0 30px var(--neon); }
        .label { font-size: 1rem; letter-spacing: 5px; color: #fff; text-transform: uppercase; }

        /* Нижняя панель: Управление и Логи */
        .bottom-deck { display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon); 
            font-family: inherit; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .danger { border-color: #ff003c; color: #ff003c; }
        .danger:hover { background: #ff003c; color: #fff; }

        #console-flow { background: #000; border: 1px solid #1a1a1a; padding: 15px; font-size: 0.8rem; overflow-y: auto; white-space: pre-wrap; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="screen">
    <div class="top-bar">
        <div class="glitch">XAM_OS_TERMINAL_v5.0</div>
        <div id="status-link">[ STATUS: ENCRYPTED_UPLINK ]</div>
        <div id="timer">00:00:00</div>
    </div>

    <div class="main-engine">
        <div class="module">
            <div class="label">CPU_CORE_LOAD</div>
            <div class="big-data" id="cpu">00</div>
            <div style="font-size: 1.5rem;">PERCENTAGE_UTILIZATION</div>
        </div>
        <div class="module">
            <div class="label">MEMORY_BLOCK_USAGE</div>
            <div class="big-data" id="ram">00</div>
            <div style="font-size: 1.5rem;">ALLOCATED_RESOURCES</div>
        </div>
    </div>

    <div class="bottom-deck">
        <div class="controls">
            <button onclick="run('screenshot')">Capture</button>
            <button onclick="run('calc')">Utility</button>
            <button class="danger" onclick="run('reboot')">Reboot</button>
            <button class="danger" onclick="run('shutdown')">Kill_Sys</button>
        </div>
        <div id="console-flow">>> SYSTEM INITIALIZED... READY FOR COMMANDS.</div>
    </div>
</div>

<script>
    const CONFIG = {
        u: 'drodilkin',
        r: 'my-pc-monitor',
        t: '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'
    };

    function log(msg) {
        const c = document.getElementById('console-flow');
        c.innerHTML += `\n[${new Date().toLocaleTimeString()}] > ${msg}`;
        c.scrollTop = c.scrollHeight;
    }

    async function run(a) {
        if(!confirm('CONFIRM ' + a)) return;
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.u}/${CONFIG.r}/contents/command.json`);
            const f = await res.json();
            const body = { 
                message: "cmd_broadcast", 
                content: btoa(JSON.stringify({command: a, time: Date.now()})), 
                sha: f.sha 
            };
            await fetch(`https://api.github.com/repos/${CONFIG.u}/${CONFIG.r}/contents/command.json`, {
                method: 'PUT',
                headers: { 'Authorization': 'token ' + CONFIG.t },
                body: JSON.stringify(body)
            });
            log('COMMAND_SENT: ' + a);
        } catch(e) { log('NETWORK_ERROR: ' + e.message); }
    }

    async function sync() {
        try {
            const r = await fetch(`https://raw.githubusercontent.com/${CONFIG.u}/${CONFIG.r}/main/stats.json?v=${Date.now()}`);
            const d = await r.json();
            document.getElementById('cpu').innerText = Math.round(d.cpu);
            document.getElementById('ram').innerText = Math.round(d.ram);
            document.getElementById('status-link').style.color = '#00ff41';
        } catch(e) {
            document.getElementById('status-link').style.color = '#ff003c';
        }
    }

    setInterval(() => { document.getElementById('timer').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(sync, 5000);
    sync();
</script>

</body>
</html>

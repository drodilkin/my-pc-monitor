<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XAM | TERMINAL</title>
    <style>
        body { background: #080808; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .term { width: 90%; max-width: 500px; background: #000; border: 1px solid #222; padding: 40px 30px; position: relative; box-shadow: 0 0 30px rgba(0,255,65,0.05); }
        .term::before { content: "● ● ●"; position: absolute; top: 10px; left: 15px; color: #222; font-size: 10px; letter-spacing: 3px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 25px; border-bottom: 1px solid #111; padding-bottom: 8px; font-size: 1.1rem; }
        .lbl { color: #444; font-size: 0.8rem; text-transform: uppercase; }
        .val { font-weight: bold; color: #fff; }
        #t-v { color: #ffbd2e; }
        .st { border: 1px solid #00ff41; padding: 2px 10px; font-size: 0.8rem; }
        .blink { display: inline-block; width: 10px; height: 18px; background: #00ff41; animation: b 1s infinite; vertical-align: middle; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="term">
    <div style="color: #222; font-size: 0.7rem; margin-bottom: 20px;">> XAM_CORE_v1.2_STABLE</div>
    
    <div class="row"><span class="lbl">CPU_LOAD</span><span class="val"><span id="c-v">--</span>%</span></div>
    <div class="row"><span class="lbl">CORE_TEMP</span><span class="val"><span id="t-v">--</span>°C</span></div>
    <div class="row"><span class="lbl">RAM_USAGE</span><span class="val"><span id="r-v">--</span>%</span></div>

    <div class="row" style="border:none; margin-top:30px;">
        <span class="lbl">SYSTEM_LINK</span>
        <span id="s-v" class="st">ONLINE</span>
    </div>

    <div style="font-size: 0.8rem; color: #111; margin-top: 15px;">
        root@xam:~$ <span class="blink"></span>
    </div>
</div>

<script>
    // ТУТ ТОЛЬКО ТВОИ ДАННЫЕ
    const user = 'drodilkin';
    const repo = 'my-pc-monitor';
    const file = 'stats.json';

    async function up() {
        try {
            // Используем прямой fetch с обходом кэша
            const r = await fetch(`https://raw.githubusercontent.com/${user}/${repo}/main/${file}?v=${Date.now()}`);
            const d = await r.json();

            document.getElementById('c-v').innerText = parseFloat(d.cpu) || '0';
            document.getElementById('r-v').innerText = parseFloat(d.ram) || '0';
            document.getElementById('t-v').innerText = d.temp.replace('°C', '').trim();
            
            const s = document.getElementById('s-v');
            if (parseFloat(d.cpu) > 85) {
                s.innerText = "HOT"; s.style.color = "#ff5f56"; s.style.borderColor = "#ff5f56";
            } else {
                s.innerText = "STABLE"; s.style.color = "#00ff41"; s.style.borderColor = "#00ff41";
            }
        } catch (e) {
            document.getElementById('s-v').innerText = "ERROR";
        }
    }
    setInterval(up, 10000); // Обновляем каждые 10 секунд
    up();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XAM | CMD_MONITOR</title>
    <style>
        body { background: #000; color: #00ff41; font-family: "Consolas", monospace; padding: 20px; font-size: 14px; }
        .dim { color: #444; }
        .val { color: #fff; font-weight: bold; }
        #wrap { border-left: 2px solid #222; padding-left: 15px; margin: 15px 0; }
        .blink { animation: b 1s infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="dim">XAM_MONITORING_OS [Version 13.0.1]</div>
    <div class="dim">Turbo_Cache_Bypass: ACTIVE</div>

    <div id="wrap">
        <div>>>> STATUS: <span id="st">CONNECTING...</span></div>
        <div>------------------------------------</div>
        <div>CPU_LOAD: [ <span id="c" class="val">00</span>% ]</div>
        <div>RAM_LOAD: [ <span id="r" class="val">00</span>% ]</div>
        <div>TEMP_VAL: [ <span id="t" class="val">00</span>°C ]</div>
        <div>------------------------------------</div>
        <div class="dim">SYNC: <span id="s">--:--:--</span></div>
    </div>

    <div>C:\XAM_MONITOR> <span class="blink">_</span></div>

    <script>
        // Твоя маскировка токена (разбей его сам, если надо)
        const REPO = "drodilkin/my-pc-monitor";

        async function refresh() {
            try {
                // Добавляем ?t=... чтобы сбить кэш Гитхаба
                const r = await fetch(`https://raw.githubusercontent.com/${REPO}/main/stats.json?t=${Date.now()}`);
                if (!r.ok) return;
                const d = await r.json();

                document.getElementById('c').innerText = Math.round(d.cpu);
                document.getElementById('r').innerText = Math.round(d.ram);
                document.getElementById('t').innerText = d.temp;
                document.getElementById('s').innerText = d.time;
                document.getElementById('st').innerText = "ONLINE";
                document.getElementById('st').className = "green";
            } catch(e) {
                document.getElementById('st').innerText = "LINK_DELAY";
            }
        }

        // Опрашиваем раз в 2 секунды (быстрее смысла нет из-за CDN Гитхаба)
        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>

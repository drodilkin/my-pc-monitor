<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xam | System Terminal</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal {
            width: 90%;
            max-width: 600px;
            background: #000;
            border: 1px solid #333;
            padding: 40px 30px 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            position: relative;
        }

        /* Та самая полоска как у окна */
        .terminal-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .dot { height: 8px; width: 8px; border-radius: 50%; margin-right: 5px; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green-dot { background: #27c93f; }

        .line { margin-bottom: 20px; font-size: 1.1rem; display: flex; justify-content: space-between; }
        .label { color: #888; text-transform: uppercase; font-size: 0.8rem; }
        .value { font-weight: bold; margin-left: 10px; color: #fff; }
        
        #temp { color: #ffbd2e; }

        .status-badge {
            padding: 2px 10px;
            border: 1px solid #00ff41;
            font-size: 0.9rem;
            color: #00ff41;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="terminal-header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green-dot"></div>
        <span style="color: #444; font-size: 0.7rem; margin-left: 10px;">SYSTEM MONITOR V1.0</span>
    </div>

    <div style="margin-bottom: 25px; font-size: 0.9rem; opacity: 0.7;">> CONNECTING TO SERVER... <span style="color: #00ff41;">OK</span></div>
    
    <div class="line">
        <span class="label">ЦП ЗАГРУЗКА:</span>
        <span class="value"><span id="cpu">--</span>%</span>
    </div>

    <div class="line">
        <span class="label">ТЕМПЕРАТУРА:</span>
        <span class="value"><span id="temp">--</span>°C</span>
    </div>

    <div class="line">
        <span class="label">ПАМЯТЬ:</span>
        <span class="value"><span id="ram">--</span>%</span>
    </div>

    <div class="line" style="margin-top: 30px;">
        <span class="label">СТАТУС:</span>
        <span id="status" class="status-badge">ONLINE</span>
    </div>

    <div style="margin-top: 20px; font-size: 0.8rem; color: #222;">
        root@xam:~$ <span class="cursor"></span>
    </div>
</div>

<script>
    const OWNER = 'drodilkin';
    const REPO = 'my-pc-monitor';
    const PATH = 'stats.json';

    async function update() {
        try {
            const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?t=${Date.now()}`);
            const data = await response.json();
            const stats = JSON.parse(atob(data.content));

            // Обновляем только числа, проценты и градусы уже вписаны в HTML
            document.getElementById('cpu').innerText = stats.cpu.replace('%', '');
            document.getElementById('ram').innerText = stats.ram.replace('%', '');
            
            // Чистим температуру от лишних букв, если они прилетели
            let t = stats.temp.replace('°C', '').replace(',', '.').trim();
            document.getElementById('temp').innerText = t;

            const st = document.getElementById('status');
            if (parseFloat(stats.cpu) > 80) {
                st.innerText = "HOT";
                st.style.color = "#ff5f56";
                st.style.borderColor = "#ff5f56";
            } else {
                st.innerText = "STABLE";
                st.style.color = "#00ff41";
                st.style.borderColor = "#00ff41";
            }
        } catch (e) {
            document.getElementById('status').innerText = "LINK LOST";
        }
    }

    setInterval(update, 15000);
    update();
</script>

</body>
</html>

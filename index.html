<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>XAM | TERMINAL</title>
    <style>
        body { background: #020202; color: #00ff41; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { width: 95%; max-width: 450px; background: #000; border: 1px solid #00ff41; padding: 25px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.15); }
        .row { margin: 10px 0; display: flex; justify-content: space-between; font-size: 18px; border-bottom: 1px solid #111; padding: 5px 0; }
        .val { color: #fff; font-weight: bold; }
        .RUNNING { color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        .OFFLINE { color: #ff3e3e; text-shadow: 0 0 5px #ff3e3e; }
        #status { font-size: 10px; color: #444; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="terminal">
    <div style="font-size: 12px; color: #555; margin-bottom: 15px;">XAM_TERMINAL_v19.5 // RAW_DATA_LINK</div>
    
    <div class="row"><span>CPU:</span> <span id="c" class="val">--%</span></div>
    <div class="row"><span>RAM:</span> <span id="r" class="val">--%</span></div>
    <div class="row"><span>TEMP:</span> <span id="t" class="val">--°C</span></div>
    
    <div id="servers" style="margin-top: 15px;"></div>

    <div id="status">SYNC: <span id="time">--:--:--</span> | <span id="msg">CONNECTING...</span></div>
</div>

<script>
    // === ЗАМЕНИ НА СВОЙ НИК И РЕПО ===
    const USER = "drodilkin";
    const REPO = "my-pc-monitor";
    // Используем raw-ссылку, она обновляется быстрее всего
    const URL = `https://raw.githubusercontent.com/${USER}/${REPO}/main/stats.json`;

    async function sync() {
        try {
            const r = await fetch(`${URL}?t=${Date.now()}`); // ?t= убивает кэш браузера
            
            if (!r.ok) {
                document.getElementById('msg').innerText = "404 - NOT FOUND";
                return;
            }

            const d = await r.json();
            document.getElementById('msg').innerText = "OK";
            
            document.getElementById('c').innerText = Math.round(d.cpu) + '%';
            document.getElementById('r').innerText = Math.round(d.ram) + '%';
            document.getElementById('t').innerText = d.temp + '°C';
            document.getElementById('time').innerText = d.time;

            const srvCont = document.getElementById('servers');
            srvCont.innerHTML = "";
            if (d.servers) {
                for (const [name, status] of Object.entries(d.servers)) {
                    srvCont.innerHTML += `
                        <div class="row">
                            <span>> ${name}:</span>
                            <span class="${status}">${status}</span>
                        </div>`;
                }
            }
        } catch(e) {
            document.getElementById('msg').innerText = "NETWORK ERROR";
        }
    }

    setInterval(sync, 5000); // Обновляем каждые 5 секунд
    sync();
</script>
</body>
</html>
